# =============================================================================
# Nginx Configuration — Rev. Isaac Mpamaugo Website
# =============================================================================
# Install: sudo cp nginx.conf /etc/nginx/sites-available/revisaacmpamaugo.online
# Enable:  sudo ln -sf /etc/nginx/sites-available/revisaacmpamaugo.online /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx
#
# Before enabling SSL, run:
#   sudo certbot --nginx -d revisaacmpamaugo.online -d www.revisaacmpamaugo.online
# =============================================================================

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name revisaacmpamaugo.online www.revisaacmpamaugo.online;

    # Let certbot validate domain ownership
    location ~ /.well-known/acme-challenge/ {
        root /var/www/revisaacmpamaugo/public;
        allow all;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS server ────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name revisaacmpamaugo.online www.revisaacmpamaugo.online;

    # ── SSL (managed by Certbot) ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/revisaacmpamaugo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/revisaacmpamaugo.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_vary on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Reverse proxy to Next.js (standalone on port 3000) ───────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Disable buffering for streaming (Suspense, ISR)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Static: Next.js build assets (immutable, long cache) ─────────────────
    location /_next/static/ {
        alias /var/www/revisaacmpamaugo/.next/standalone/website/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # ── Static: User uploads ─────────────────────────────────────────────────
    location /uploads/ {
        alias /var/www/revisaacmpamaugo/.next/standalone/website/public/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ── Static: Public assets (favicon, robots.txt, etc.) ────────────────────
    location /public/ {
        alias /var/www/revisaacmpamaugo/.next/standalone/website/public/;
        expires 1d;
        access_log off;
    }

    # ── Deny access to hidden files ──────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny access to sensitive file types ──────────────────────────────────
    location ~* \.(env|db|sqlite|log)$ {
        deny all;
        return 404;
    }
}
