# Rev. Isaac Mpamaugo Website — Nginx Configuration for DigitalOcean
# Deploy to /etc/nginx/sites-available/revisaacmpamaugo.online
# Then: sudo ln -s /etc/nginx/sites-available/revisaacmpamaugo.online /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# SSL: sudo certbot --nginx -d revisaacmpamaugo.online -d www.revisaacmpamaugo.online
# Or use the setup script: bash deploy/digitalocean-setup.sh

# HTTP — redirects to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name revisaacmpamaugo.online www.revisaacmpamaugo.online;

    # Certbot verification
    location ~ /.well-known/acme-challenge/ {
        root /var/www/revisaacmpamaugo/public;
        allow all;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name revisaacmpamaugo.online www.revisaacmpamaugo.online;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/revisaacmpamaugo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/revisaacmpamaugo.online/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/revisaacmpamaugo.online/chain.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (uncomment after confirming SSL works)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # Root directory for static files
    root /var/www/revisaacmpamaugo/.next/standalone/website/public;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; media-src 'self' https:; frame-src 'none'; object-src 'none'" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_vary on;

    # Reverse proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Don't buffer server-sent events
        proxy_buffering off;
        proxy_cache off;
    }

    # Static file serving: Next.js build output (immutable, long cache)
    location /_next/static/ {
        alias /var/www/revisaacmpamaugo/.next/standalone/website/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # Static file serving: user uploads
    location /uploads/ {
        alias /var/www/revisaacmpamaugo/.next/standalone/website/public/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        access_log off;

        # Restrict uploads to images and documents
        location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico|pdf|doc|docx|mp3|mp4|webm)$ {
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        }

        # Deny access to non-media files
        location ~* \.(php|py|pl|cgi|asp|aspx|sh|bat)$ {
            deny all;
            return 404;
        }
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ (node_modules|\.env|\.git|package-lock\.json) {
        deny all;
        return 404;
    }

    # Health check endpoint
    location = /api/health {
        proxy_pass http://127.0.0.1:3000/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
        allow 127.0.0.1;
        # Remove or adjust the allow rule for monitoring services
        deny all;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/revisaacmpamaugo/.next/standalone/website/public;
    }
}
